<!-- Pagefind Search JS -->
<script src="/pagefind/pagefind-ui.js"></script>
<script>
    window.addEventListener('DOMContentLoaded', (event) => {
        // Initialize search on the dedicated search page
        const searchContainer = document.getElementById('pagefind-search');
        if (searchContainer) {
            new PagefindUI({ 
                element: "#pagefind-search", 
                showSubResults: true,
                showImages: false
            });
        }

        // Initialize search in the topnav
        const topnavSearch = document.getElementById('pagefind-topnav-search');
        if (topnavSearch) {
            new PagefindUI({ 
                element: "#pagefind-topnav-search", 
                showSubResults: false,
                showImages: false,
                resetStyles: false
            });
        }
    });
</script>
